<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ספר הקהילה">
<title>ספר הקהילה · Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+Hebrew:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1419;
    --bg-2: #161c24;
    --surface: #1c242e;
    --surface-2: #232d39;
    --surface-hover: #2a3543;
    --line: #2d3845;
    --line-soft: #232d39;
    --text: #eef2f6;
    --text-2: #aab6c4;
    --text-3: #6b7785;
    --accent: #5e9b8c;
    --accent-2: #7bb8a8;
    --accent-glow: rgba(94, 155, 140, 0.25);
    --gold: #c9a55c;
    --danger: #e0775f;
    --radius: 20px;
    --radius-sm: 14px;
    --radius-lg: 28px;
    --shadow: 0 4px 24px rgba(0,0,0,0.35);
    --shadow-lg: 0 20px 60px rgba(0,0,0,0.55);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f3f5f8;
      --bg-2: #ffffff;
      --surface: #ffffff;
      --surface-2: #f7f9fb;
      --surface-hover: #eef2f6;
      --line: #e2e8f0;
      --line-soft: #eef2f6;
      --text: #131a22;
      --text-2: #4a5763;
      --text-3: #8b97a4;
      --accent: #2f8a76;
      --accent-2: #3a9d87;
      --accent-glow: rgba(47, 138, 118, 0.15);
      --gold: #a8862f;
      --danger: #d35a3f;
      --shadow: 0 4px 20px rgba(20,30,45,0.08);
      --shadow-lg: 0 20px 50px rgba(20,30,45,0.18);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'Heebo', 'Noto Sans Hebrew', 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* Ambient gradient backdrop */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(900px circle at 85% -5%, var(--accent-glow), transparent 45%),
      radial-gradient(700px circle at 10% 100%, rgba(201,165,92,0.10), transparent 50%);
    pointer-events: none;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 16px calc(120px + var(--safe-bottom));
  }

  /* ===== Header ===== */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    padding-top: calc(var(--safe-top) + 14px);
    padding-bottom: 10px;
    background: linear-gradient(to bottom, var(--bg) 55%, transparent);
    -webkit-backdrop-filter: blur(2px);
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }

  .brand-id {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .brand-mark {
    width: 46px;
    height: 46px;
    border-radius: 14px;
    background: linear-gradient(145deg, var(--accent), var(--accent-2));
    display: grid;
    place-items: center;
    font-size: 22px;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 6px 18px var(--accent-glow);
    font-family: 'Noto Sans Hebrew', serif;
    font-weight: 700;
  }

  .brand-text { min-width: 0; }

  .brand-text h1 {
    font-family: 'Noto Sans Hebrew', 'Heebo', sans-serif;
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  .brand-text p {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.72rem;
    color: var(--text-3);
    direction: ltr;
    text-align: right;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .install-btn {
    flex-shrink: 0;
    border: none;
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--line);
    padding: 9px 14px;
    border-radius: 999px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 6px;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .install-btn.show { display: inline-flex; }
  .install-btn:hover { background: var(--surface-hover); border-color: var(--accent); }
  .install-btn:active { transform: scale(0.96); }
  .install-btn svg { width: 15px; height: 15px; }

  /* ===== Search ===== */
  .search-bar {
    position: relative;
    margin-bottom: 12px;
  }

  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: var(--radius);
    padding: 15px 50px 15px 18px;
    font-family: 'Heebo', 'Noto Sans Hebrew', sans-serif;
    font-size: 1.05rem;
    color: var(--text);
    outline: none;
    transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow);
  }

  .search-bar input::placeholder { color: var(--text-3); }

  .search-bar input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow), var(--shadow);
  }

  .search-bar .s-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-3);
    pointer-events: none;
    display: flex;
  }
  .search-bar .s-icon svg { width: 20px; height: 20px; }

  .search-bar .clear-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--surface-hover);
    border: none;
    color: var(--text-2);
    width: 26px;
    height: 26px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .search-bar.has-value .clear-btn { display: flex; }
  .search-bar.has-value .s-icon { display: none; }

  /* ===== Sort pills ===== */
  .sort-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .sort-row::-webkit-scrollbar { display: none; }

  .pill {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text-2);
    padding: 8px 16px;
    border-radius: 999px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
  }
  .pill:active { transform: scale(0.95); }
  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  /* ===== Results meta ===== */
  .results-meta {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--text-3);
    direction: ltr;
    text-align: right;
    padding: 14px 4px 8px;
    letter-spacing: 0.02em;
  }

  /* ===== Section headers ===== */
  .section-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 6px 10px;
    position: sticky;
    top: calc(var(--safe-top) + 76px);
    z-index: 10;
    scroll-margin-top: calc(var(--safe-top) + 132px);
  }
  .section-head .letter {
    font-family: 'Noto Sans Hebrew', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    width: 42px;
    height: 42px;
    border-radius: 13px;
    background: var(--accent-glow);
    display: grid;
    place-items: center;
    backdrop-filter: blur(8px);
  }
  .section-head .rule {
    flex: 1;
    height: 1px;
    background: linear-gradient(to left, transparent, var(--line));
  }
  .section-head .sec-count {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.72rem;
    color: var(--text-3);
    direction: ltr;
  }

  /* ===== Contact cards ===== */
  .cards { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .card:active { transform: scale(0.985); background: var(--surface-hover); }
  @media (hover: hover) {
    .card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow); }
  }

  .avatar {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    font-family: 'Noto Sans Hebrew', sans-serif;
    font-weight: 700;
    font-size: 1.25rem;
    color: #fff;
  }

  /* House / Street View thumbnail on the card */
  .thumb {
    position: relative;
    width: 56px;
    height: 56px;
    border-radius: 14px;
    flex-shrink: 0;
    overflow: hidden;
    display: block;
    text-decoration: none;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    transition: transform 0.16s ease;
  }
  .thumb:active { transform: scale(0.93); }
  @media (hover: hover) { .thumb:hover { transform: scale(1.05); } }
  .thumb img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }
  .thumb .house-ic {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    color: rgba(255,255,255,0.92);
    z-index: 0;
  }
  .thumb .house-ic svg { width: 26px; height: 26px; }
  /* When a real image is present, hide the icon underneath it */
  .thumb img + .house-ic { display: none; }
  .thumb .thumb-badge {
    position: absolute;
    right: 3px;
    bottom: 3px;
    z-index: 2;
    width: 17px;
    height: 17px;
    border-radius: 50%;
    background: rgba(15,20,25,0.78);
    color: #fff;
    display: grid;
    place-items: center;
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
  }
  .thumb .thumb-badge svg { width: 10px; height: 10px; }

  .card-body { flex: 1; min-width: 0; }

  .card-name {
    font-family: 'Noto Sans Hebrew', 'Heebo', sans-serif;
    font-size: 1.08rem;
    font-weight: 700;
    line-height: 1.25;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-name .pre { color: var(--gold); font-weight: 500; font-size: 0.82em; }
  .card-name .post { color: var(--gold); font-weight: 500; font-size: 0.78em; }

  .card-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--text-3);
    direction: ltr;
    text-align: right;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 7px;
    flex-wrap: wrap;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.72rem;
    color: var(--text-2);
    background: var(--surface-2);
    padding: 3px 9px;
    border-radius: 8px;
    direction: ltr;
  }
  .tag svg { width: 12px; height: 12px; opacity: 0.7; }
  .gtag {
    font-family: 'Noto Sans Hebrew', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 6px;
    line-height: 1.4;
  }
  .gtag.gm { background: rgba(107,140,206,0.22); color: #8aa6e0; }
  .gtag.gv { background: rgba(206,107,140,0.22); color: #e08aa6; }
  @media (prefers-color-scheme: light) {
    .gtag.gm { background: rgba(60,100,180,0.14); color: #3a62b0; }
    .gtag.gv { background: rgba(180,60,100,0.14); color: #b03a62; }
  }

  .card-chevron {
    color: var(--text-3);
    flex-shrink: 0;
    display: flex;
    opacity: 0.5;
  }
  .card-chevron svg { width: 20px; height: 20px; }

  mark {
    background: var(--accent-glow);
    color: var(--accent-2);
    border-radius: 4px;
    padding: 0 2px;
    font-weight: 700;
  }

  /* ===== Empty ===== */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-3);
  }
  .empty .big { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
  .empty p { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.95rem; }

  /* ===== Floating alpha rail ===== */
  .alpha-rail {
    position: fixed;
    left: 4px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 25;
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding: 8px 3px;
    background: color-mix(in srgb, var(--surface) 80%, transparent);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border-radius: 999px;
    border: 1px solid var(--line-soft);
  }
  .alpha-rail button {
    border: none;
    background: transparent;
    color: var(--text-3);
    font-family: 'Noto Sans Hebrew', sans-serif;
    font-size: 0.66rem;
    font-weight: 600;
    width: 18px;
    height: 15px;
    cursor: pointer;
    border-radius: 4px;
    padding: 0;
    line-height: 1;
    transition: color 0.12s ease;
  }
  .alpha-rail button:active { color: var(--accent); transform: scale(1.4); }
  .alpha-rail button.dim { opacity: 0.25; }
  @media (max-width: 380px) { .alpha-rail button { height: 13px; } }

  /* ===== Detail sheet ===== */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(5, 8, 12, 0.6);
    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }

  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 101;
    background: var(--bg-2);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 0 0 calc(24px + var(--safe-bottom));
    transform: translateY(100%);
    transition: transform 0.36s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 88vh;
    max-height: 88dvh;
    overflow-y: auto;
    max-width: 760px;
    margin: 0 auto;
    box-shadow: var(--shadow-lg);
    -webkit-overflow-scrolling: touch;
  }
  .sheet.open { transform: translateY(0); }

  .sheet-grip {
    position: sticky;
    top: 0;
    background: var(--bg-2);
    padding: 12px 0 4px;
    display: flex;
    justify-content: center;
    z-index: 2;
  }
  .sheet-grip span {
    width: 40px; height: 4px;
    background: var(--line);
    border-radius: 999px;
  }

  .sheet-streetview {
    display: block;
    position: relative;
    margin: 4px 16px 0;
    border-radius: var(--radius);
    overflow: hidden;
    height: 150px;
    box-shadow: var(--shadow);
  }
  .sheet-streetview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .sheet-streetview .sv-tag {
    position: absolute;
    left: 10px;
    bottom: 10px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(15,20,25,0.74);
    color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 999px;
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
  }
  .sheet-streetview .sv-tag svg { width: 13px; height: 13px; }
  /* When a street view banner is shown, pull the avatar up to overlap it */
  .sheet-streetview + .sheet-hero { padding-top: 8px; }

  .sheet-hero {
    text-align: center;
    padding: 8px 24px 22px;
    position: relative;
  }
  .sheet-avatar {
    width: 78px; height: 78px;
    border-radius: 24px;
    margin: 0 auto 14px;
    display: grid;
    place-items: center;
    font-family: 'Noto Sans Hebrew', sans-serif;
    font-weight: 700;
    font-size: 2rem;
    color: #fff;
    box-shadow: var(--shadow);
  }
  .sheet-pre {
    font-family: 'Noto Sans Hebrew', sans-serif;
    color: var(--gold);
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .sheet-name {
    font-family: 'Noto Sans Hebrew', 'Heebo', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1.15;
  }
  .sheet-post { font-family: 'Noto Sans Hebrew', sans-serif; color: var(--gold); font-size: 0.85rem; font-weight: 500; margin-top: 2px;}
  .sheet-name-en {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text-3);
    direction: ltr;
    margin-top: 6px;
  }

  /* Quick action buttons */
  .actions {
    display: flex;
    gap: 10px;
    padding: 0 20px 18px;
    justify-content: center;
  }
  .action {
    flex: 1;
    max-width: 110px;
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 13px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: var(--text);
    transition: all 0.16s ease;
    cursor: pointer;
  }
  .action:active { transform: scale(0.95); background: var(--surface-hover); }
  .action .ic {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: grid; place-items: center;
    background: var(--accent-glow);
    color: var(--accent-2);
  }
  .action .ic svg { width: 19px; height: 19px; }
  .action span {
    font-family: 'Heebo', 'Plus Jakarta Sans', sans-serif;
    font-size: 0.7rem;
    color: var(--text-2);
    font-weight: 500;
    text-align: center;
    line-height: 1.2;
  }
  .action.disabled { opacity: 0.35; pointer-events: none; }

  .detail-list { padding: 4px 18px 0; }
  .detail-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 6px;
    border-bottom: 1px solid var(--line-soft);
    direction: ltr;
    text-decoration: none;
    color: var(--text);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .d-ic {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: var(--surface);
    display: grid; place-items: center;
    color: var(--text-3);
    flex-shrink: 0;
  }
  .detail-row .d-ic svg { width: 18px; height: 18px; }
  .detail-row .d-body { flex: 1; min-width: 0; }
  .detail-row .d-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.72rem;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 1px;
  }
  .detail-row .d-value {
    font-family: 'Plus Jakarta Sans', 'Heebo', sans-serif;
    font-size: 1.0rem;
    color: var(--text);
    word-break: break-word;
  }
  .detail-row .d-value.he { font-family: 'Noto Sans Hebrew', sans-serif; direction: rtl; }
  .detail-row.tappable .d-go { color: var(--text-3); display: flex; }
  .detail-row.tappable .d-go svg { width: 18px; height: 18px; }

  /* ===== Install hint card (iOS) ===== */
  .ios-hint {
    position: fixed;
    left: 16px; right: 16px;
    bottom: calc(16px + var(--safe-bottom));
    z-index: 90;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow-lg);
    display: none;
    max-width: 728px;
    margin: 0 auto;
    align-items: flex-start;
    gap: 12px;
  }
  .ios-hint.show { display: flex; }
  .ios-hint .h-txt { flex: 1; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.85rem; color: var(--text-2); line-height: 1.45; }

<script>
(function () {
  "use strict";
  const DATA = JSON.parse(document.getElementById('data').textContent);
  const HEB = 'אבגדהוזחטיכלמנסעפצקרשת'.split('');
  const LAT = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const FINALS = { 'ך':'כ','ם':'מ','ן':'נ','ף':'פ','ץ':'צ' };
  const AVATAR_COLORS = [
    ['#5e9b8c','#7bb8a8'], ['#c9a55c','#dcc07e'], ['#6b8cce','#8aa6e0'],
    ['#ce6b8c','#e08aa6'], ['#9b7bce','#b89ae0'], ['#ce8c5e','#e0a87b'],
    ['#5ec9b0','#7be0c8'], ['#a88cce','#c0a8e0']
  ];

  const $ = s => document.querySelector(s);
  const $list = $('#list'), $meta = $('#resultsMeta'), $rail = $('#alphaRail');
  const $sheet = $('#sheet'), $backdrop = $('#backdrop');
  const $search = $('#search'), $searchBar = $('#searchBar'), $clearBtn = $('#clearBtn');

  let state = { q: '', sort: 'he' };

  // ===== Street View house images =====
  // The app AUTOMATICALLY shows baked-in photos if a "photos" folder sits next to
  // this file (with 0.jpg, 1.jpg, ... made by bake-photos.html). If the folder
  // isn't there, each card gracefully shows a house icon that links to live
  // Street View. There is NO setting to toggle — re-uploading this file can never
  // turn photos off. (Optional: paste a key in STREETVIEW_API_KEY for live mode.)
  const PHOTOS_DIR = 'photos';         // folder holding 0.jpg, 1.jpg, ...
  const PHOTOS_EXT = 'jpg';
  const STREETVIEW_API_KEY = '';       // optional live mode; usually leave empty
  const CITY_SUFFIX = ', Antwerpen, Belgium';

  // Attach a stable photo index to every record (its position in the list)
  DATA.forEach(function(r, i){ r._px = i; });

  function bakedPhoto(rec) {
    if (!rec.address) return '';
    return PHOTOS_DIR + '/' + rec._px + '.' + PHOTOS_EXT;
  }
  function streetViewThumb(rec) {
    // Used only when an API key is set (live mode)
    if (!STREETVIEW_API_KEY || !rec.address) return '';
    const loc = encodeURIComponent(rec.address + CITY_SUFFIX);
    return 'https://maps.googleapis.com/maps/api/streetview?size=300x300&location='
      + loc + '&fov=80&pitch=8&key=' + STREETVIEW_API_KEY;
  }
  function photoFor(rec) {
    // Prefer the local baked file (auto-detected via onerror fallback in the card);
    // if a live key is set, use that instead.
    return STREETVIEW_API_KEY ? streetViewThumb(rec) : bakedPhoto(rec);
  }
  function streetViewLink(address) {
    const loc = encodeURIComponent(address + CITY_SUFFIX);
    return 'https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=' + loc;
  }
  function mapsSearchLink(address) {
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address + CITY_SUFFIX);
  }

  function norm(s) {
    if (!s) return '';
    return s.toString().replace(/[\u0591-\u05C7]/g,'').toLowerCase().trim();
  }
  function digits(s){ return (s||'').replace(/[^0-9]/g,''); }

  // ===== Hebrew <-> Latin phonetic search =====
  // Maps each Hebrew letter to its Latin sound, so a name typed in English
  // letters (e.g. "oberlander", "grosz", "kohn") matches the Hebrew entry,
  // and vice-versa. Designed for Ashkenazi/Yiddish community names.
  const HEB2LAT = {
    'א':'',  'ב':'b', 'ג':'g', 'ד':'d', 'ה':'h', 'ו':'v', 'ז':'z',
    'ח':'ch','ט':'t', 'י':'i', 'כ':'k', 'ך':'k', 'ל':'l', 'מ':'m',
    'ם':'m', 'נ':'n', 'ן':'n', 'ס':'s', 'ע':'',  'פ':'p', 'ף':'p',
    'צ':'tz','ץ':'tz','ק':'k', 'ר':'r', 'ש':'sh','ת':'t'
  };

  function translit(heb) {
    if (!heb) return '';
    let out = '';
    const s = heb.replace(/[\u0591-\u05C7]/g,''); // strip nikkud
    for (let i=0;i<s.length;i++){
      const c = s[i];
      if (c === 'ו' && s[i+1] === 'ו') { out += 'v'; i++; continue; } // וו -> v/w
      if (c === 'י' && s[i+1] === 'י') { out += 'i'; i++; continue; } // יי -> i
      if (HEB2LAT.hasOwnProperty(c)) out += HEB2LAT[c];
      else if (/[a-z]/i.test(c)) out += c.toLowerCase();
      else if (c === ' ') out += ' ';
    }
    return out;
  }

  // Collapse a Latin string to a spelling-insensitive "sound skeleton" so that
  // grosz/gross/gros, kohn/cohen/kohen, schwartz/shvarts, etc. all match.
  function soundKey(s) {
    if (!s) return '';
    let x = s.toLowerCase();
    x = x.replace(/[\u0591-\u05C7]/g,'');
    x = x.replace(/[^a-z\u05d0-\u05ea ]/g,''); // keep latin + hebrew letters
    // If it contains Hebrew, transliterate first
    if (/[\u05d0-\u05ea]/.test(x)) x = translit(x);
    x = x.toLowerCase();
    // phonetic folding
    x = x.replace(/sch/g,'sh')      // schwartz -> shwartz
         .replace(/tsch/g,'ch')
         .replace(/[ckq]/g,'k')      // c, q -> k
         .replace(/ph/g,'f')
         .replace(/w/g,'v')          // w -> v
         .replace(/ck/g,'k')
         .replace(/tz|ts|cz/g,'z')   // tz/ts -> z-ish
         .replace(/sz/g,'s')         // polish sz -> s
         .replace(/sh/g,'s')         // sh -> s (fold)
         .replace(/ch|kh/g,'k')      // ch/kh (guttural) -> k
         .replace(/x/g,'ks')
         .replace(/j/g,'i')
         .replace(/[aeiou]/g,'')     // drop vowels (most variation is here)
         .replace(/(.)\1+/g,'$1');   // collapse doubles
    return x.trim();
  }

  function esc(s){
    if (s==null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Precompute a phonetic skeleton for every contact (Hebrew name + English name)
  DATA.forEach(function(r){
    const heb = [r.lastName, r.firstName].filter(Boolean).join(' ');
    const en  = [r.lastNameEn, r.firstNameEn].filter(Boolean).join(' ');
    r._sk = (soundKey(heb) + ' ' + soundKey(en)).trim();
  });

  function avatarColor(rec) {
    const key = (rec.lastNameEn || rec.lastName || '?').charCodeAt(0) || 0;
    return AVATAR_COLORS[key % AVATAR_COLORS.length];
  }
  function avatarChar(rec) {
    const s = rec.lastName || rec.lastNameEn || '?';
    return s.trim().charAt(0);
  }

  function initial(rec, mode) {
    const src = mode === 'en' ? rec.lastNameEn : rec.lastName;
    if (!src) return '';
    let c = src.trim().charAt(0).toUpperCase();
    return FINALS[c] || c;
  }

  function cmp(a,b){
    if (state.sort === 'num') {
      const an = typeof a.id==='number'?a.id:9e9, bn = typeof b.id==='number'?b.id:9e9;
      return an-bn;
    }
    if (state.sort === 'en') {
      return (a.lastNameEn||'\uffff').localeCompare(b.lastNameEn||'\uffff','en',{sensitivity:'base'})
          || (a.firstNameEn||'').localeCompare(b.firstNameEn||'','en',{sensitivity:'base'});
    }
    return (a.lastName||'\uffff').localeCompare(b.lastName||'\uffff','he')
        || (a.firstName||'').localeCompare(b.firstName||'','he');
  }

  function matches(r, q, qd) {
    if (!q) return true;
    const qn = norm(q);
    const fields = [r.lastName,r.firstName,r.titleBefore,r.titleAfter,r.inLaw,r.address,r.lastNameEn,r.firstNameEn];
    for (const f of fields) if (norm(f).includes(qn)) return true;
    // Phonetic / cross-script match: type a name in English letters and still
    // find the Hebrew entry (and vice-versa). Needs >=2 letters to avoid noise.
    const qLetters = qn.replace(/[^a-z\u05d0-\u05ea]/g,'');
    if (qLetters.length >= 2) {
      const qsk = soundKey(qn);
      if (qsk && r._sk && r._sk.includes(qsk)) return true;
    }
    if (qd && qd.length>=2) {
      if (digits(r.phone).includes(qd)) return true;
      if (digits(r.mobileM).includes(qd)) return true;
      if (digits(r.mobileV).includes(qd)) return true;
    }
    return false;
  }

  function hi(text, q) {
    if (!text) return '';
    if (!q) return esc(text);
    const qn = norm(q); if (!qn) return esc(text);
    const tn = norm(text); const i = tn.indexOf(qn);
    if (i<0) return esc(text);
    return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+qn.length))+'</mark>'+esc(text.slice(i+qn.length));
  }

  function tel(n){ return (n||'').replace(/[^\d+]/g,''); }

  function render() {
    const q = state.q.trim(), qd = digits(q);
    let rows = DATA.filter(r => matches(r,q,qd));
    rows.sort(cmp);

    $list.innerHTML = '';
    $searchBar.classList.toggle('has-value', !!q);

    if (!rows.length) {
      $list.innerHTML = '<div class="empty"><div class="big">⌕</div><p>No matches for "'+esc(q)+'"</p></div>';
      $meta.textContent = '';
      buildRail([]);
      return;
    }

    $meta.textContent = q
      ? rows.length + ' of ' + DATA.length + ' contacts'
      : DATA.length + ' contacts';

    const grouped = (state.sort !== 'num');
    const frag = document.createDocumentFragment();
    const railLetters = [];
    let curLetter = null;
    let idx = 0;

    rows.forEach(r => {
      if (grouped) {
        const L = initial(r, state.sort==='en'?'en':'he') || '#';
        if (L !== curLetter) {
          curLetter = L;
          railLetters.push(L);
          const sh = document.createElement('div');
          sh.className = 'section-head';
          sh.id = 'sec-' + L;
          sh.innerHTML = '<div class="letter">'+esc(L)+'</div><div class="rule"></div>';
          frag.appendChild(sh);
        }
      }
      frag.appendChild(card(r, q, idx++));
    });

    $list.appendChild(frag);
    buildRail(grouped ? railLetters : []);
  }

  function card(r, q, idx) {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.animationDelay = Math.min(idx*12, 260) + 'ms';

    const [c1,c2] = avatarColor(r);
    const heName = (r.lastName||'') + (r.firstName ? ' ' + r.firstName : '');
    const enName = [r.firstNameEn, r.lastNameEn].filter(Boolean).join(' ');

    let tags = '';
    const phoneIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h4l2 5-3 2a11 11 0 005 5l2-3 5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"/></svg>';
    const homeIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-6 8 6"/><path d="M6 10v9h12v-9"/></svg>';
    if (r.phone) {
      tags += '<span class="tag">'+homeIcon+esc(r.phone)+'</span>';
    }
    if (r.mobileM) {
      tags += '<span class="tag"><b class="gtag gm">בעל</b>'+esc(r.mobileM)+'</span>';
    }
    if (r.mobileV) {
      tags += '<span class="tag"><b class="gtag gv">אשה</b>'+esc(r.mobileV)+'</span>';
    }
    if (r.address) {
      tags += '<span class="tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.5-7-11a7 7 0 0114 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>'+hi(r.address,q)+'</span>';
    }

    // Left thumbnail: house (Street View) if address, else letter avatar
    let thumb;
    const houseIconBig = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>';
    if (r.address) {
      const img = photoFor(r);
      thumb = '<a class="thumb house" href="'+streetViewLink(r.address)+'" target="_blank" rel="noopener" aria-label="Street View" style="background:linear-gradient(145deg,'+c1+','+c2+')">'+
        (img ? '<img loading="lazy" src="'+img+'" alt="" onerror="this.remove()">' : '')+
        '<span class="house-ic">'+houseIconBig+'</span>'+
        '<span class="thumb-badge">'+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 21s-7-5-7-11a7 7 0 0114 0c0 6-7 11-7 11z"/></svg>'+
        '</span>'+
      '</a>';
    } else {
      thumb = '<div class="avatar" style="background:linear-gradient(145deg,'+c1+','+c2+')">'+esc(avatarChar(r))+'</div>';
    }

    el.innerHTML =
      thumb +
      '<div class="card-body">'+
        '<div class="card-name">'+
          (r.titleBefore?'<span class="pre">'+esc(r.titleBefore)+'</span> ':'')+
          hi(heName,q)+
          (r.titleAfter?' <span class="post">'+esc(r.titleAfter)+'</span>':'')+
        '</div>'+
        (enName?'<div class="card-sub">'+hi(enName,q)+'</div>':'')+
        (tags?'<div class="card-meta">'+tags+'</div>':'')+
      '</div>'+
      '<div class="card-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></div>';

    // Thumbnail tap opens Street View; don't also open the detail sheet
    const thumbEl = el.querySelector('.thumb');
    if (thumbEl) thumbEl.addEventListener('click', e => e.stopPropagation());

    el.addEventListener('click', () => openSheet(r));
    return el;
  }

  function buildRail(letters) {
    if (!letters.length) { $rail.style.display='none'; return; }
    $rail.style.display='flex';
    $rail.innerHTML='';
    const set = new Set(letters);
    const universe = state.sort==='en' ? LAT : HEB;
    universe.forEach(L => {
      const b = document.createElement('button');
      b.textContent = L;
      if (!set.has(L)) b.className='dim';
      else b.addEventListener('click', ()=>{
        const t = document.getElementById('sec-'+L);
        if (!t) return;
        // Compute target accounting for the sticky top bar + section header height,
        // so jumps land correctly whether scrolling up or down.
        const topbar = document.querySelector('.topbar');
        const offset = (topbar ? topbar.offsetHeight : 90) + 12;
        const y = t.getBoundingClientRect().top + window.pageYOffset - offset;
        window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });
      });
      $rail.appendChild(b);
    });
  }

  function detailRow(icon, label, value, opts={}) {
    const tappable = opts.href ? 'tappable' : '';
    const tag = opts.href ? 'a' : 'div';
    const hrefAttr = opts.href ? ' href="'+opts.href+'"'+(opts.blank?' target="_blank" rel="noopener"':'') : '';
    const go = opts.href ? '<div class="d-go"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></div>' : '';
    return '<'+tag+hrefAttr+' class="detail-row '+tappable+'">'+
      '<div class="d-ic">'+icon+'</div>'+
      '<div class="d-body"><div class="d-label">'+esc(label)+'</div>'+
      '<div class="d-value '+(opts.he?'he':'')+'">'+esc(value)+'</div></div>'+
      go+'</'+tag+'>';
  }

  const IC = {
    phone:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h4l2 5-3 2a11 11 0 005 5l2-3 5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"/></svg>',
    mobile:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2.5"/><path d="M11 18h2"/></svg>',
    man:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="14" r="5"/><path d="M14 10l6-6m0 0h-4m4 0v4"/></svg>',
    woman:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M12 13v8m-3-3h6"/></svg>',
    pin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.5-7-11a7 7 0 0114 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>',
    ring:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M5 21c0-4 3-6 7-6s7 2 7 6"/></svg>',
    hash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9h14M5 15h14M10 4l-2 16M16 4l-2 16"/></svg>',
    home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M6 10v9h12v-9"/></svg>',
    streetview:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="3"/><path d="M12 12c-3 0-5 1.5-5 4v5h10v-5c0-2.5-2-4-5-4z"/><circle cx="12" cy="9" r="9" opacity="0.35"/></svg>'
  };

  function openSheet(r) {
    const [c1,c2] = avatarColor(r);
    const heFull = [r.titleBefore, r.lastName, r.firstName].filter(Boolean).join(' ');
    const enFull = [r.firstNameEn, r.lastNameEn].filter(Boolean).join(' ');

    const phoneSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h4l2 5-3 2a11 11 0 005 5l2-3 5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"/></svg>';
    const smsSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a8 8 0 01-11 7l-5 2 2-5a8 8 0 1114-4z"/></svg>';
    const mapSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-5.5-7-11a7 7 0 0114 0c0 5.5-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>';
    const svSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="3"/><path d="M12 12c-3 0-5 1.5-5 4v5h10v-5c0-2.5-2-4-5-4z"/></svg>';
    const callAction = (num, label) => '<a class="action" href="tel:'+tel(num)+'"><div class="ic">'+phoneSvg+'</div><span>'+label+'</span></a>';

    let actions = '<div class="actions">';
    if (r.mobileM && r.mobileV) {
      // Two people: call husband, call wife
      actions += callAction(r.mobileM, 'בעל · Husband');
      actions += callAction(r.mobileV, 'אשה · Wife');
    } else {
      const primaryCall = r.mobileM || r.mobileV || r.phone;
      actions += primaryCall
        ? callAction(primaryCall, 'Call')
        : '<div class="action disabled"><div class="ic">'+phoneSvg+'</div><span>Call</span></div>';
      actions += primaryCall
        ? '<a class="action" href="sms:'+tel(primaryCall)+'"><div class="ic">'+smsSvg+'</div><span>Text</span></a>'
        : '';
    }
    if (r.address) {
      actions += '<a class="action" href="'+streetViewLink(r.address)+'" target="_blank" rel="noopener"><div class="ic">'+svSvg+'</div><span>Street View</span></a>';
      actions += '<a class="action" href="'+mapsSearchLink(r.address)+'" target="_blank" rel="noopener"><div class="ic">'+mapSvg+'</div><span>Map</span></a>';
    }
    actions += '</div>';

    let rows = '<div class="detail-list">';
    if (r.phone)   rows += detailRow(IC.home, 'Home telephone · טלפון', r.phone, {href:'tel:'+tel(r.phone)});
    if (r.mobileM) rows += detailRow(IC.man, 'Mobile · בעל (husband)', r.mobileM, {href:'tel:'+tel(r.mobileM)});
    if (r.mobileV) rows += detailRow(IC.woman, 'Mobile · אשה (wife)', r.mobileV, {href:'tel:'+tel(r.mobileV)});
    if (r.address) rows += detailRow(IC.pin, 'Address', r.address, {href:mapsSearchLink(r.address), blank:true});
    if (r.inLaw)   rows += detailRow(IC.ring, 'חתן · Son-in-law of', r.inLaw, {he:true});
    if (r.id!=null) rows += detailRow(IC.hash, 'List number', String(r.id));
    rows += '</div>';

    // Optional Street View hero banner (baked photo or live API)
    let heroImg = '';
    const heroSrc = photoFor(r);
    if (r.address && heroSrc) {
      heroImg = '<a class="sheet-streetview" href="'+streetViewLink(r.address)+'" target="_blank" rel="noopener">'+
        '<img loading="lazy" src="'+heroSrc+'" alt="Street View" onerror="this.closest(\'.sheet-streetview\').style.display=\'none\'">'+
        '<span class="sv-tag">'+svSvg+' Street View</span></a>';
    }

    $sheet.innerHTML =
      '<div class="sheet-grip"><span></span></div>'+
      heroImg +
      '<div class="sheet-hero">'+
        '<div class="sheet-avatar" style="background:linear-gradient(145deg,'+c1+','+c2+')">'+esc(avatarChar(r))+'</div>'+
        (r.titleBefore?'<div class="sheet-pre">'+esc(r.titleBefore)+'</div>':'')+
        '<div class="sheet-name">'+esc([r.lastName,r.firstName].filter(Boolean).join(' '))+'</div>'+
        (r.titleAfter?'<div class="sheet-post">'+esc(r.titleAfter)+'</div>':'')+
        (enFull?'<div class="sheet-name-en">'+esc(enFull)+'</div>':'')+
      '</div>'+
      actions + rows;

    $backdrop.classList.add('open');
    $sheet.classList.add('open');
    document.body.style.overflow='hidden';
  }

  function closeSheet() {
    $backdrop.classList.remove('open');
    $sheet.classList.remove('open');
    document.body.style.overflow='';
  }

  $backdrop.addEventListener('click', closeSheet);
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeSheet(); });

  // swipe-down to close
  let startY=null;
  $sheet.addEventListener('touchstart', e=>{ if ($sheet.scrollTop<=0) startY=e.touches[0].clientY; }, {passive:true});
  $sheet.addEventListener('touchmove', e=>{
    if (startY===null) return;
    const dy = e.touches[0].clientY - startY;
    if (dy>0) $sheet.style.transform='translateY('+dy+'px)';
  }, {passive:true});
  $sheet.addEventListener('touchend', e=>{
    if (startY===null) return;
    const dy = e.changedTouches[0].clientY - startY;
    $sheet.style.transform='';
    if (dy>90) closeSheet();
    startY=null;
  });

  // Search
  let t;
  $search.addEventListener('input', e=>{
    clearTimeout(t);
    const v = e.target.value;
    t = setTimeout(()=>{ state.q=v; render(); }, 70);
  });
  $clearBtn.addEventListener('click', ()=>{ $search.value=''; state.q=''; render(); $search.focus(); });

  // Sort
  $('#sortRow').addEventListener('click', e=>{
    const p = e.target.closest('.pill'); if(!p) return;
    [...$('#sortRow').children].forEach(c=>c.classList.remove('active'));
    p.classList.add('active');
    state.sort = p.dataset.sort;
    render();
    window.scrollTo({top:0, behavior:'smooth'});
  });

  $('#foot').textContent = DATA.length + ' contacts · Antwerpen · works offline';

  render();

  // ===== PWA install =====
  const swCode = `
    const CACHE='kehilla-v1';
    self.addEventListener('install', e=>{ self.skipWaiting(); });
    self.addEventListener('activate', e=>{ e.waitUntil(clients.claim()); });
    self.addEventListener('fetch', e=>{
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(resp=>{
          if (e.request.method==='GET' && resp.ok) {
            const clone=resp.clone();
            caches.open(CACHE).then(c=>c.put(e.request, clone));
          }
          return resp;
        }).catch(()=>caches.match(e.request)))
      );
    });
  `;

  // Build manifest with embedded SVG icon (data URI)
  const iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#5e9b8c"/><text x="256" y="360" font-size="300" text-anchor="middle" font-family="serif" fill="#fff" font-weight="700">ק</text></svg>';
  const iconUrl = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);
  const manifest = {
    name: 'ספר הקהילה · Community Directory',
    short_name: 'ספר הקהילה',
    start_url: '.',
    scope: '.',
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#0f1419',
    theme_color: '#0f1419',
    lang: 'he',
    dir: 'rtl',
    icons: [
      { src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' },
      { src: iconUrl, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' }
    ]
  };

  // Inject manifest link
  try {
    const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
    const mLink = document.createElement('link');
    mLink.rel = 'manifest';
    mLink.href = URL.createObjectURL(mBlob);
    document.head.appendChild(mLink);
    // apple touch icon
    const aLink = document.createElement('link');
    aLink.rel = 'apple-touch-icon';
    aLink.href = iconUrl;
    document.head.appendChild(aLink);
  } catch(err){}

  // Register service worker (only works on http/https, not file://)
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    try {
      const swBlob = new Blob([swCode], {type:'text/javascript'});
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(()=>{});
    } catch(err){}
  }

  // Install button (Android/Chrome/Edge/desktop)
  let deferredPrompt = null;
  const $install = $('#installBtn');
  window.addEventListener('beforeinstallprompt', e=>{
    e.preventDefault();
    deferredPrompt = e;
    $install.classList.add('show');
  });
  $install.addEventListener('click', async ()=>{
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    $install.classList.remove('show');
  });
  window.addEventListener('appinstalled', ()=>{ $install.classList.remove('show'); });

  // iOS install hint (no beforeinstallprompt on iOS Safari)
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) ||
                (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
  const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isStandalone && location.protocol.startsWith('http')) {
    const dismissed = sessionStorage.getItem('iosHintDismissed');
    if (!dismissed) {
      setTimeout(()=>$('#iosHint').classList.add('show'), 1600);
    }
  }
  $('#iosClose').addEventListener('click', ()=>{
    $('#iosHint').classList.remove('show');
    try { sessionStorage.setItem('iosHintDismissed','1'); } catch(e){}
  });

})();
</script>
</body>
</html>
